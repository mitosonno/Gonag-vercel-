<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guliya</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080604;color:#f2e8d0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px 14px 40px;min-height:100vh}
.logo{font-size:10px;letter-spacing:3px;color:rgba(201,168,76,.4);margin-bottom:2px;text-transform:uppercase}
.sub{font-size:11px;color:rgba(255,255,255,.2);margin-bottom:20px}
.av-wrap{position:relative;width:80px;height:80px;margin-bottom:12px}
.av{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#2a1f06,#0e0a02);border:2px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-size:34px;position:relative;z-index:1}
.ring{position:absolute;inset:-6px;border-radius:50%;border:1.5px solid rgba(201,168,76,.15)}
.ring2{position:absolute;inset:-13px;border-radius:50%;border:1px solid rgba(201,168,76,.08)}
@keyframes pr{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.07);opacity:.9}}
.sp .ring{animation:pr .8s ease infinite}
.sp .ring2{animation:pr 1.2s ease infinite}
@keyframes ls{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.07);opacity:.9}}
.ls .ring{animation:ls .4s ease infinite;border-color:rgba(80,200,120,.5)}
.ls .ring2{animation:ls .6s ease infinite;border-color:rgba(80,200,120,.3)}
.status{font-size:11px;color:rgba(201,168,76,.55);font-weight:600;margin-bottom:14px;min-height:16px;text-align:center}
.chat{width:100%;max-width:400px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:260px;overflow-y:auto}
.chat::-webkit-scrollbar{width:2px}.chat::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2)}
.msg{display:flex;gap:7px;align-items:flex-start;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}
.av2{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.msg.agent .av2{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25)}
.msg.user .av2{background:rgba(255,255,255,.06)}
.bb{padding:8px 11px;border-radius:10px;font-size:12px;line-height:1.55;max-width:86%}
.msg.agent .bb{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.1)}
.msg.user .bb{background:rgba(255,255,255,.06)}
.badge{margin-top:5px;display:inline-flex;align-items:center;gap:4px;background:rgba(80,200,120,.1);border:1px solid rgba(80,200,120,.28);border-radius:6px;padding:2px 8px;font-size:10px;color:#50c878}
.stats{width:100%;max-width:400px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.12);border-radius:8px;padding:7px 5px;text-align:center}
.stat-n{font-size:17px;font-weight:800;color:#c9a84c}
.stat-l{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px}
.tbls{width:100%;max-width:400px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px}
.tc{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.12);border-radius:7px;padding:5px 3px;text-align:center;transition:all .4s}
.tc.hi{border-color:rgba(80,200,120,.5);background:rgba(80,200,120,.07)}
.tc-n{font-size:12px;font-weight:800;color:#c9a84c}
.tc-g{font-size:8px;color:rgba(255,255,255,.3);margin-top:1px;line-height:1.3;word-break:break-word}
.inp-row{width:100%;max-width:400px;display:flex;gap:7px;margin-bottom:8px}
.inp{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);border-radius:9px;padding:9px 12px;color:#f2e8d0;font-size:13px;outline:none;font-family:inherit}
.inp:focus{border-color:rgba(201,168,76,.5)}
.inp::placeholder{color:rgba(255,255,255,.2)}
.send-btn{width:42px;height:42px;border-radius:9px;border:1px solid rgba(201,168,76,.3);background:rgba(201,168,76,.12);color:#c9a84c;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qr{width:100%;max-width:400px;display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.qb{padding:5px 9px;border-radius:13px;border:1px solid rgba(201,168,76,.28);background:rgba(201,168,76,.06);color:#e8cc78;font-size:10px;cursor:pointer}
.qb:active{background:rgba(201,168,76,.2)}
.mic-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.mic-btn{width:50px;height:50px;border-radius:50%;border:2px solid rgba(201,168,76,.35);background:rgba(201,168,76,.08);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .2s;flex-shrink:0}
.mic-btn.on{background:rgba(80,200,120,.15);border-color:rgba(80,200,120,.5)}
.hint{font-size:10px;color:rgba(255,255,255,.18);text-align:center}
.trans{min-height:14px;font-size:11px;color:rgba(80,200,120,.65);font-style:italic;text-align:center;margin-bottom:4px}
.typing{display:flex;gap:4px;align-items:center;padding:8px 12px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.1);border-radius:10px}
.dot{width:6px;height:6px;border-radius:50%;background:#c9a84c;animation:d .9s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes d{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="logo">GONAG.AZ</div>
<div class="sub">Guliya — Toy Koordinatoru</div>
<div class="av-wrap" id="avW"><div class="ring"></div><div class="ring2"></div><div class="av">👩‍💼</div></div>
<div class="status" id="st">Hazırdır</div>
<div class="chat" id="chat"></div>
<div class="stats">
  <div class="stat"><div class="stat-n" id="sG">0</div><div class="stat-l">Qonaq</div></div>
  <div class="stat"><div class="stat-n" id="sT">8</div><div class="stat-l">Masa</div></div>
  <div class="stat"><div class="stat-n" id="sD">—</div><div class="stat-l">Toy günü</div></div>
</div>
<div class="tbls" id="tbls"></div>
<div class="inp-row">
  <input class="inp" id="inp" placeholder="Yazın..." onkeydown="if(event.key==='Enter')send()"/>
  <button class="send-btn" onclick="send()">➤</button>
</div>
<div class="qr">
  <button class="qb" onclick="qs('Salam Guliya!')">👋 Salam</button>
  <button class="qb" onclick="qs('Toyum 20 iyunda, bey Rauf, gəlin Nigar')">🗓 Toy tarixi</button>
  <button class="qb" onclick="qs('Masa 2-yə Leyla əlavə et, 3 nəfər')">+ Qonaq</button>
  <button class="qb" onclick="qs('Neçə qonaq var?')">📊 Statistika</button>
  <button class="qb" onclick="qs('Gülüstan Sarayını seç')">🏛 Restoran</button>
  <button class="qb" onclick="qs('150 qonaq, adam başına 80 manat büdcə')">💰 Büdcə</button>
  <button class="qb" onclick="qs('Rauf və Nigar üçün dəvət mətni yaz')">✉️ Dəvət</button>
</div>
<div class="trans" id="trans"></div>
<div class="mic-row">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</button>
  <div class="hint">Mikrofona bas və danış<br>Android Chrome-da işləyir</div>
</div>

<script>
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwdm9sdXR0eGVsd25xY2Zuc2JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODQ4MTMsImV4cCI6MjA4ODk2MDgxM30.qodOw68r3OgeQXrr-SnzTDiXI4eI_moD4IWG-Dzj368";

const S={
  tables:Array.from({length:8},(_,i)=>({id:i+1,seats:8,guests:[]})),
  weddingDate:null,couple:{boy:"",girl:""},budget:null,restaurant:null,history:[]
};
let hiId=null,thinkEl=null,recog=null,isL=false,isSp=false;

function renderT(){
  document.getElementById("tbls").innerHTML=S.tables.map(t=>{
    const occ=t.guests.reduce((s,g)=>s+(g.count||1),0);
    return`<div class="tc ${t.id===hiId?"hi":""}">
      <div class="tc-n">${t.id}</div>
      <div style="font-size:9px;color:${occ>0?"#50c878":"rgba(201,168,76,.35)"};">${occ}/${t.seats}</div>
      <div class="tc-g">${t.guests.map(g=>g.name).join(", ")||"—"}</div>
    </div>`;
  }).join("");
}
function renderSt(){
  const tot=S.tables.reduce((s,t)=>s+t.guests.reduce((ss,g)=>ss+(g.count||1),0),0);
  document.getElementById("sG").textContent=tot;
  if(S.weddingDate){
    const days=Math.ceil((new Date(S.weddingDate)-new Date())/86400000);
    document.getElementById("sD").textContent=days>0?days+"g":"🎉";
  }
}
function addMsg(role,txt,badge){
  const c=document.getElementById("chat");
  if(thinkEl){thinkEl.remove();thinkEl=null;}
  const d=document.createElement("div");
  d.className="msg "+role;
  d.innerHTML=`<div class="av2">${role==="agent"?"👩‍💼":"👤"}</div><div class="bb">${txt}${badge?`<div class="badge">✓ ${badge}</div>`:""}</div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function showTyping(){
  const c=document.getElementById("chat");
  if(thinkEl)thinkEl.remove();
  const d=document.createElement("div");
  d.className="msg agent";
  d.innerHTML=`<div class="av2">👩‍💼</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;thinkEl=d;
}
function setAv(s){document.getElementById("avW").className="av-wrap"+(s?" "+s:"");}

function speak(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang="az-AZ";u.rate=1.05;u.pitch=1.1;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(x=>x.lang.startsWith("az")||x.lang.startsWith("tr")||x.lang.startsWith("ru"));
  if(v)u.voice=v;
  isSp=true;setAv("sp");document.getElementById("st").textContent="Guliya danışır...";
  u.onend=u.onerror=()=>{isSp=false;setAv("");document.getElementById("st").textContent="Hazırdır";};
  window.speechSynthesis.speak(u);
}

function toggleMic(){
  if(isSp)return;
  if(isL){stopMic();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addMsg("agent","Mikrofon bu brauzerdə işləmir. Chrome istifadə edin.");return;}
  recog=new SR();recog.lang="az-AZ";recog.interimResults=true;
  recog.onstart=()=>{isL=true;setAv("ls");document.getElementById("st").textContent="Dinlənilir...";document.getElementById("micBtn").classList.add("on");};
  recog.onresult=e=>{
    let fin="",int="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)fin+=e.results[i][0].transcript;
      else int+=e.results[i][0].transcript;
    }
    document.getElementById("trans").textContent=int||fin;
    if(fin){document.getElementById("trans").textContent="";proc(fin.trim());}
  };
  recog.onerror=e=>{
    document.getElementById("st").textContent=e.error==="not-allowed"?"Mikrofon icazəsi lazımdır!":"Xəta baş verdi.";
    stopMic();
  };
  recog.onend=()=>stopMic();
  recog.start();
}
function stopMic(){
  isL=false;if(recog)try{recog.stop();}catch(e){}
  document.getElementById("micBtn").classList.remove("on");
  if(!isSp){setAv("");document.getElementById("st").textContent="Hazırdır";}
}

function send(){const i=document.getElementById("inp");const t=i.value.trim();if(!t)return;i.value="";proc(t);}
function qs(t){proc(t);}

async function proc(text){
  if(!text)return;
  addMsg("user",text);showTyping();setAv("sp");
  document.getElementById("st").textContent="Guliya düşünür...";

  const tSum=S.tables.map(t=>{
    const occ=t.guests.reduce((s,g)=>s+(g.count||1),0);
    const ns=t.guests.map(g=>g.name+(g.count>1?"("+g.count+")":"")).join(", ");
    return`Masa ${t.id}: ${occ}/${t.seats}${ns?" — "+ns:""}`;
  }).join("\n");

  const sys=`Sən GONAG.AZ-ın toy koordinatoru Guliyasan. Mehriban, peşəkar. Azərbaycanca danış. Qısa cavab ver.

Cari vəziyyət:
${tSum}
Toy tarixi: ${S.weddingDate||"bilinmir"}
Cütlük: ${S.couple.boy||"?"} & ${S.couple.girl||"?"}
Büdcə: ${S.budget||"bilinmir"}
Restoran: ${S.restaurant||"seçilməyib"}

Yalnız JSON qaytar:
{"reply":"Cavab az-AZ (max 2 cümlə)","action":"add_guest|remove_guest|move_guest|set_date|set_couple|set_budget|set_restaurant|invite_text|info|none","tableId":null,"guestName":null,"guestCount":null,"fromTableId":null,"toTableId":null,"date":null,"boy":null,"girl":null,"budget":null,"restaurant":null,"inviteText":null}`;

  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-dangerous-allow-browser":"true"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:500,
        system:sys,
        messages:[...S.history,{role:"user",content:text}]
      })
    });
    const data=await r.json();
    const raw=data.content?.[0]?.text||"{}";
    let p;
    try{p=JSON.parse(raw.replace(/```json|```/g,"").trim());}
    catch{p={reply:"Başa düşmədim, yenidən cəhd edin.",action:"none"};}

    S.history.push({role:"user",content:text},{role:"assistant",content:raw});
    if(S.history.length>16)S.history=S.history.slice(-16);

    let badge=null;hiId=null;
    if(p.action==="add_guest"&&p.tableId&&p.guestName){
      const t=S.tables.find(t=>t.id===p.tableId);
      if(t){t.guests.push({id:Date.now(),name:p.guestName,count:p.guestCount||1});badge=`${p.guestName} → Masa ${p.tableId}`;hiId=p.tableId;}
    }else if(p.action==="remove_guest"&&p.tableId&&p.guestName){
      const t=S.tables.find(t=>t.id===p.tableId);
      if(t){const b=t.guests.length;t.guests=t.guests.filter(g=>!g.name.toLowerCase().includes(p.guestName.toLowerCase()));if(t.guests.length<b){badge=`${p.guestName} silindi`;hiId=p.tableId;}}
    }else if(p.action==="move_guest"&&p.fromTableId&&p.toTableId){
      const f=S.tables.find(t=>t.id===p.fromTableId),to=S.tables.find(t=>t.id===p.toTableId);
      if(f&&to){const g=f.guests.find(g=>g.name.toLowerCase().includes((p.guestName||"").toLowerCase()));if(g){f.guests=f.guests.filter(x=>x.id!==g.id);to.guests.push(g);badge=`${g.name}: ${p.fromTableId}→${p.toTableId}`;hiId=p.toTableId;}}
    }else if(p.action==="set_date"&&p.date){
      S.weddingDate=p.date;badge="Toy tarixi: "+p.date;
    }else if(p.action==="set_couple"){
      if(p.boy)S.couple.boy=p.boy;if(p.girl)S.couple.girl=p.girl;
      badge=S.couple.boy+" & "+S.couple.girl;
    }else if(p.action==="set_budget"&&p.budget){
      S.budget=p.budget;badge="Büdcə: "+p.budget;
    }else if(p.action==="set_restaurant"&&p.restaurant){
      S.restaurant=p.restaurant;badge="Restoran: "+p.restaurant;
    }

    renderT();renderSt();
    if(hiId)setTimeout(()=>{hiId=null;renderT();},2500);

    let display=p.reply||"Başa düşdüm.";
    if(p.inviteText)display+=`<br><br><div style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:10px;font-size:11px;color:rgba(255,220,150,.85);line-height:1.7;margin-top:4px;white-space:pre-wrap">${p.inviteText}</div>`;
    addMsg("agent",display,badge);
    speak(p.reply||"Başa düşdüm.");
    setAv("");document.getElementById("st").textContent="Hazırdır";

  }catch(e){
    if(thinkEl){thinkEl.remove();thinkEl=null;}
    addMsg("agent","API xətası: "+e.message);
    setAv("");document.getElementById("st").textContent="Hazırdır";
  }
}

renderT();renderSt();
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}
setTimeout(()=>{
  proc("Salam Guliya!");
},500);
</script>
</body>
</html>
